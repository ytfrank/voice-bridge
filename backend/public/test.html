<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBridge 测试页面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui; background: #0f172a; color: #e2e8f0; padding: 20px; max-width: 800px; margin: 0 auto; }
h1 { margin-bottom: 20px; font-size: 22px; }
h2 { margin: 20px 0 10px; font-size: 16px; color: #94a3b8; }
.section { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #334155; }
label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
input[type=file], select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; margin-bottom: 12px; }
button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
button:hover { background: #1d4ed8; }
button:disabled { background: #475569; cursor: not-allowed; }
.result { background: #0f172a; border-radius: 8px; padding: 16px; margin-top: 12px; font-family: monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; min-height: 60px; border: 1px solid #334155; }
.timing { color: #6ee7b7; font-weight: 600; }
.error { color: #fca5a5; }
.success { color: #6ee7b7; }
.status { font-size: 13px; margin-top: 8px; }
#mic-section { display: none; }
.recording { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body>
<h1>🎙️ VoiceBridge 测试页面</h1>
<p style="color:#94a3b8;margin-bottom:20px;font-size:13px">用于自动化测试，绕过 Expo Go。直接调用 BFF API。</p>

<div class="section">
  <h2>📁 文件测试（支持任意时长音频）</h2>
  <label>选择音频文件（WAV/MP3/M4A/MP4）</label>
  <input type="file" id="audioFile" accept="audio/*,video/mp4">
  <button id="btnFile" onclick="testFile()">开始识别 + 翻译</button>
  <div class="status" id="fileStatus"></div>
  <div class="result" id="fileResult">等待测试...</div>
</div>

<div class="section">
  <h2>🎤 麦克风实时录音测试</h2>
  <button id="btnMic" onclick="toggleMic()">🎙️ 开始录音</button>
  <span id="micTimer" style="margin-left:12px;color:#94a3b8"></span>
  <div class="status" id="micStatus"></div>
  <div class="result" id="micResult">等待录音...</div>
</div>

<div class="section">
  <h2>🏥 BFF 健康检查</h2>
  <button onclick="healthCheck()">检查</button>
  <div class="result" id="healthResult">等待检查...</div>
</div>

<script>
const BFF = window.location.origin;

// ── File test ──
async function testFile() {
  const file = document.getElementById('audioFile').files[0];
  if (!file) { alert('请先选择文件'); return; }
  
  const btn = document.getElementById('btnFile');
  const status = document.getElementById('fileStatus');
  const result = document.getElementById('fileResult');
  
  btn.disabled = true;
  btn.textContent = '处理中...';
  status.innerHTML = `上传中: ${file.name} (${(file.size/1024).toFixed(0)}KB)`;
  
  const formData = new FormData();
  formData.append('audio', file);
  
  const t0 = performance.now();
  try {
    const resp = await fetch(`${BFF}/api/debug/transcribe-file`, { method: 'POST', body: formData });
    const data = await resp.json();
    const total = ((performance.now() - t0) / 1000).toFixed(1);
    
    if (data.success) {
      status.innerHTML = `<span class="success">✅ 成功</span> | 总耗时: <span class="timing">${total}s</span> | ASR: ${data.whisperMs}ms | 翻译: ${data.translateMs}ms`;
      result.innerHTML = `【英文原文】\n${data.transcribedText}\n\n【中文翻译】\n${data.translation}`;
    } else {
      status.innerHTML = `<span class="error">❌ 失败</span> | ${data.reason || 'unknown'}`;
      result.innerHTML = JSON.stringify(data, null, 2);
    }
  } catch(e) {
    status.innerHTML = `<span class="error">❌ 网络错误: ${e.message}</span>`;
    result.innerHTML = '';
  }
  
  btn.disabled = false;
  btn.textContent = '开始识别 + 翻译';
}

// ── Mic test ──
let mediaRecorder = null;
let micChunks = [];
let micInterval = null;
let micStart = 0;

async function toggleMic() {
  const btn = document.getElementById('btnMic');
  
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.textContent = '🎙️ 开始录音';
    btn.classList.remove('recording');
    clearInterval(micInterval);
    return;
  }
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    micChunks = [];
    
    mediaRecorder.ondataavailable = (e) => micChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(micChunks, { type: 'audio/webm' });
      document.getElementById('micStatus').innerHTML = `录音完成 (${(blob.size/1024).toFixed(0)}KB)，处理中...`;
      
      const formData = new FormData();
      formData.append('audio', blob, 'recording.webm');
      
      const t0 = performance.now();
      try {
        const resp = await fetch(`${BFF}/api/debug/transcribe-file`, { method: 'POST', body: formData });
        const data = await resp.json();
        const total = ((performance.now() - t0) / 1000).toFixed(1);
        
        if (data.success) {
          document.getElementById('micStatus').innerHTML = `<span class="success">✅ 成功</span> | 总耗时: <span class="timing">${total}s</span>`;
          document.getElementById('micResult').innerHTML = `【英文原文】\n${data.transcribedText}\n\n【中文翻译】\n${data.translation}`;
        } else {
          document.getElementById('micStatus').innerHTML = `<span class="error">❌ 失败: ${data.reason}</span>`;
        }
      } catch(e) {
        document.getElementById('micStatus').innerHTML = `<span class="error">❌ 网络错误</span>`;
      }
    };
    
    mediaRecorder.start();
    micStart = Date.now();
    btn.textContent = '⏹️ 停止录音';
    btn.classList.add('recording');
    
    micInterval = setInterval(() => {
      const sec = Math.floor((Date.now() - micStart) / 1000);
      document.getElementById('micTimer').textContent = `${sec}s`;
    }, 1000);
    
  } catch(e) {
    alert('无法访问麦克风: ' + e.message);
  }
}

// ── Health check ──
async function healthCheck() {
  try {
    const resp = await fetch(`${BFF}/health`);
    const data = await resp.json();
    document.getElementById('healthResult').innerHTML = `<span class="success">✅ BFF Online</span>\n${JSON.stringify(data, null, 2)}`;
  } catch(e) {
    document.getElementById('healthResult').innerHTML = `<span class="error">❌ BFF Offline: ${e.message}</span>`;
  }
}
</script>
</body>
</html>
