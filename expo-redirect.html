<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceBridge - 打开 Expo Go</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 720px;
      text-align: center;
      padding: 36px 28px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }
    h1 { margin: 0 0 20px 0; font-size: 32px; }
    p { margin: 10px 0; font-size: 17px; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin: 12px 8px 0;
      padding: 14px 28px;
      background: white;
      color: #5b5bd6;
      text-decoration: none;
      border-radius: 999px;
      border: none;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
    }
    .btn.secondary {
      background: rgba(255, 255, 255, 0.18);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }
    .btn.disabled {
      background: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.9);
      cursor: not-allowed;
    }
    .note, .steps {
      margin-top: 22px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      text-align: left;
      word-break: break-all;
    }
    ol { margin: 8px 0 0 22px; }
    li { margin: 8px 0; }
    code {
      background: rgba(0,0,0,0.18);
      padding: 2px 6px;
      border-radius: 6px;
      word-break: break-all;
    }
    .muted { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ VoiceBridge</h1>
    <p id="status">正在解析当前 Expo Go 地址…</p>
    <p class="muted" id="hint">请稍候，页面会自动读取当前可用地址。</p>
    <div id="actions">
      <div class="btn disabled">暂不可跳转</div>
    </div>
    <div class="steps">
      <p><strong>说明</strong></p>
      <ol>
        <li>这个页面不再使用硬编码的旧 <code>exp://</code> 地址。</li>
        <li>页面会动态读取当前可用的 Expo 地址。</li>
        <li>若自动跳转失败，请点击“复制 Expo 地址”后，用 Safari 再次打开，或按团队最新验证流程处理。</li>
      </ol>
    </div>
    <div class="note" id="detail">
      <p>正在获取状态…</p>
    </div>
  </div>

  <script>
    const apiCandidates = [];
    const params = new URLSearchParams(window.location.search);
    const bff = params.get('bff');
    if (bff) {
      apiCandidates.push(bff.replace(/\/$/, '') + '/api/meta/expo-link?refresh=1');
    }
    apiCandidates.push(window.location.origin.replace(/\/$/, '') + '/api/meta/expo-link?refresh=1');

    function setActions(expoUrl) {
      const actions = document.getElementById('actions');
      if (!expoUrl) {
        actions.innerHTML = '<div class="btn disabled">暂不可跳转</div>';
        return;
      }
      actions.innerHTML = `
        <a class="btn" href="${expoUrl}">打开 Expo Go</a>
        <button class="btn secondary" onclick="copyExpoUrl('${expoUrl.replace(/'/g, "&#39;")}')">复制 Expo 地址</button>
      `;
    }

    function copyExpoUrl(value) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(value).then(() => {
          alert('Expo 地址已复制');
        });
        return;
      }
      const input = document.createElement('input');
      input.value = value;
      document.body.appendChild(input);
      input.select();
      document.execCommand('copy');
      document.body.removeChild(input);
      alert('Expo 地址已复制');
    }

    async function loadExpoLink() {
      let lastError = '';
      for (const apiUrl of apiCandidates) {
        try {
          const res = await fetch(apiUrl, { cache: 'no-store' });
          if (!res.ok) {
            lastError = 'HTTP ' + res.status;
            continue;
          }
          const data = await res.json();
          const expoUrl = data.expoGoUrl || '';
          document.getElementById('status').textContent = expoUrl ? '正在尝试打开 Expo Go…' : '未获取到可用 Expo 地址';
          document.getElementById('hint').textContent = expoUrl
            ? '如果自动跳转失败，请使用下方按钮或复制地址。'
            : '当前无法解析地址，请联系 Peter / Atlas 检查部署链路。';
          document.getElementById('detail').innerHTML = `
            <p>🔗 Expo 地址：<code>${expoUrl || 'N/A'}</code></p>
            <p>🧭 来源：<code>${data.source || 'unknown'}</code></p>
            <p>🌐 API：<code>${apiUrl}</code></p>
          `;
          setActions(expoUrl);
          if (expoUrl) {
            setTimeout(() => { window.location.href = expoUrl; }, 800);
          }
          return;
        } catch (err) {
          lastError = err && err.message ? err.message : String(err);
        }
      }

      document.getElementById('status').textContent = '读取 Expo 地址失败';
      document.getElementById('hint').textContent = '当前页面无法连接到有效的状态接口。';
      document.getElementById('detail').innerHTML = `
        <p>❌ 错误：<code>${lastError || 'unknown'}</code></p>
        <p>💡 如这是历史旧页面，请切换到当前统一公网入口，而不是继续使用旧静态链接。</p>
      `;
      setActions('');
    }

    loadExpoLink();
  </script>
</body>
</html>
